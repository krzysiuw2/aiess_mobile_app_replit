<!--
  SVG Energy Flow Dashboard Template
  ViewBox: 350 x 550 (aspect ratio ~0.64:1)

  PLACEHOLDER TOKENS (replace with dynamic values):
    {SOC_LABEL}         - "SoC"
    {SOC_VALUE}         - e.g. "42.0 %"
    {STATUS_LABEL}      - "Status"
    {STATUS_VALUE}      - "Standby" / "Charging" / "Discharging"
    {POWER_LABEL}       - "Power" / "Moc"
    {POWER_VALUE}       - e.g. "14.2 kW"
    {AI_HEADER}         - "AI LOGIC" / "LOGIKA AI"
    {AI_COL1_LABEL}     - "RULE ID" / "ID REGUAY"
    {AI_COL2_LABEL}     - "ACTION" / "AKCJA"
    {AI_COL3_LABEL}     - "TARGET" / "MOC DOC."
    {AI_RULE_ID}        - e.g. "SHAVE-SURPLUS"
    {AI_ACTION}         - "Charge" / "Standby" / "Discharge"
    {AI_POWER}          - e.g. "-14.2 kW"
    {GRID_LABEL}        - "Grid" / "Sie"
    {GRID_VALUE}        - e.g. "0.6 kW"
    {LOAD_LABEL}        - "Load" / "Odbiornik"
    {LOAD_VALUE}        - e.g. "0.6 kW"
    {PV_LABEL}          - "PV Power" / "Moc PV"
    {PV_VALUE}          - e.g. "0.0 kW"

  DYNAMIC ELEMENT IDs (manipulated by JS):
    batt-wave-container  - Battery liquid wave group (translateX + translateY)
    batt-liquid-path     - Battery liquid shape (fill color, path d)
    node-soc-text        - SoC percentage text
    node-status-text     - Status text
    status-icon          - Status icon group (animation class)
    status-outer         - Status icon outer circle (stroke color)
    status-inner         - Status icon inner circle (fill color)
    node-batt-power-text - Battery power text
    ai-id                - AI rule ID text
    ai-action            - AI action text
    ai-power             - AI target power text
    node-grid-text       - Grid power text
    grid-arrow           - Grid directional arrow path
    node-load-text       - Load power text
    smoke-1, smoke-2, smoke-3 - Smoke puff circles (animation class)
    node-pv-text         - PV power text
    pv-sun               - PV sun group (animation class)
    line-batt            - Battery flow line (animation class)
    line-load            - Load flow line (animation class)
    line-grid            - Grid flow line (animation class)
    line-pv              - PV flow line (animation class)
-->
<svg viewBox="0 0 350 550" preserveAspectRatio="xMidYMid meet" xmlns="http://www.w3.org/2000/svg">

  <!-- ========== DEFINITIONS ========== -->
  <defs>
    <filter id="card-shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.1" />
    </filter>

    <clipPath id="liquid-clip">
      <rect x="20" y="30" width="60" height="100" rx="4" />
    </clipPath>

    <filter id="lamp-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>

    <filter id="smoke-blur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1.5" />
    </filter>

    <filter id="sun-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- ========== FLOW LINES LAYER (underneath everything) ========== -->
  <g id="lines-layer">
    <!-- Base Standby Lines (always visible, grey) -->
    <path class="wire-base" d="M 50 150 L 50 250 Q 50 270 70 270 L 155 270 Q 175 270 175 290 L 175 320" />
    <path class="wire-base" d="M 175 376 L 175 420" />
    <path class="wire-base" d="M 155 350 L 60 350 Q 40 350 40 370 L 40 420" />
    <path class="wire-base" d="M 195 350 L 290 350 Q 310 350 310 370 L 310 420" />

    <!-- Animated Electron Lines (blue dashed, hidden by default) -->
    <path id="line-batt" class="wire-electrons" d="M 50 150 L 50 250 Q 50 270 70 270 L 155 270 Q 175 270 175 290 L 175 320" />
    <path id="line-load" class="wire-electrons" d="M 175 376 L 175 420" />
    <path id="line-grid" class="wire-electrons" d="M 155 350 L 60 350 Q 40 350 40 370 L 40 420" />
    <path id="line-pv"   class="wire-electrons" d="M 195 350 L 290 350 Q 310 350 310 370 L 310 420" />
  </g>

  <!-- ========== COMPONENTS LAYER ========== -->
  <g id="components-layer">

    <!-- 1. BATTERY NODE (Top Left, origin 0,0) -->
    <g transform="translate(0, 0)">
      <rect x="16" y="26" width="68" height="108" rx="8" fill="#0f172a" />
      <rect x="36" y="16" width="28" height="10" rx="3" fill="#0f172a" />
      <rect x="20" y="30" width="60" height="100" rx="4" fill="#1e293b" />
      <!-- Scale lines: 75%, 50%, 25% -->
      <g stroke="#ffffff" stroke-width="2" stroke-linecap="round" opacity="0.3">
        <line x1="72" y1="55" x2="80" y2="55" />
        <line x1="68" y1="80" x2="80" y2="80" />
        <line x1="72" y1="105" x2="80" y2="105" />
      </g>
      <!-- Animated liquid fill -->
      <g clip-path="url(#liquid-clip)">
        <g id="batt-wave-container">
          <path id="batt-liquid-path" fill="#10b981"
            d="M -120 0 Q -105 -10 -90 0 T -60 0 Q -45 -10 -30 0 T 0 0 Q 15 -10 30 0 T 60 0
               Q 75 -10 90 0 T 120 0 Q 135 -10 150 0 T 180 0 Q 195 -10 210 0 T 240 0 V 150 H -120 Z" />
        </g>
      </g>
      <!-- Glass highlights -->
      <rect x="20" y="30" width="60" height="100" rx="4" fill="none" stroke="#334155" stroke-width="2" />
      <rect x="22" y="32" width="10" height="96" rx="2" fill="#ffffff" opacity="0.1" />
    </g>

    <!-- 2. SoC CARD (origin 100, 20) -->
    <g transform="translate(100, 20)">
      <rect x="2" y="2" width="106" height="50" rx="8" fill="#ffffff" stroke="#94a3b8" stroke-width="2" filter="url(#card-shadow)" />
      <text x="55" y="22" fill="#475569" font-size="12" font-weight="600" text-anchor="middle">{SOC_LABEL}</text>
      <text id="node-soc-text" x="55" y="42" fill="#10b981" font-size="18" font-weight="bold" text-anchor="middle">{SOC_VALUE}</text>
    </g>

    <!-- 3. STATUS CARD (origin 220, 20) -->
    <g transform="translate(220, 20)">
      <rect x="2" y="2" width="116" height="50" rx="8" fill="#ffffff" stroke="#94a3b8" stroke-width="2" filter="url(#card-shadow)" />
      <g id="status-icon" transform="translate(20, 27)">
        <circle id="status-outer" cx="0" cy="0" r="10" fill="none" stroke="#64748b" stroke-width="2" stroke-linecap="round" />
        <circle id="status-inner" cx="0" cy="0" r="4" fill="#64748b" />
      </g>
      <text x="75" y="22" fill="#475569" font-size="12" font-weight="600" text-anchor="middle">{STATUS_LABEL}</text>
      <text id="node-status-text" x="75" y="42" fill="#1e293b" font-size="14" font-weight="bold" text-anchor="middle">{STATUS_VALUE}</text>
    </g>

    <!-- 4. BATTERY POWER CARD (origin 220, 80) -->
    <g transform="translate(220, 80)">
      <rect x="2" y="2" width="116" height="50" rx="8" fill="#ffffff" stroke="#94a3b8" stroke-width="2" filter="url(#card-shadow)" />
      <path d="M 25 15 L 15 30 L 22 30 L 18 40 L 30 25 L 23 25 Z" fill="none" stroke="#475569" stroke-width="2" stroke-linejoin="round" />
      <text x="75" y="22" fill="#475569" font-size="12" font-weight="600" text-anchor="middle">{POWER_LABEL}</text>
      <text id="node-batt-power-text" x="75" y="42" fill="#1e293b" font-size="16" font-weight="bold" text-anchor="middle">{POWER_VALUE}</text>
    </g>

    <!-- 5. AI DECISION NODE (origin 100, 145) -->
    <g transform="translate(100, 145)">
      <rect x="2" y="2" width="236" height="60" rx="8" fill="#ffffff" stroke="#e2e8f0" stroke-width="2" filter="url(#card-shadow)" />
      <path d="M 4 10 Q 4 4 10 4 L 230 4 Q 236 4 236 10 L 236 20 L 4 20 Z" fill="#f8fafc" />
      <line x1="2" y1="20" x2="238" y2="20" stroke="#e2e8f0" stroke-width="1" />
      <text x="12" y="15" fill="#334155" font-size="10" font-weight="bold" letter-spacing="0.5">{AI_HEADER}</text>
      <!-- Column dividers -->
      <line x1="90" y1="28" x2="90" y2="52" stroke="#f1f5f9" stroke-width="2" />
      <line x1="160" y1="28" x2="160" y2="52" stroke="#f1f5f9" stroke-width="2" />
      <!-- Column 1: Rule ID -->
      <text x="12" y="34" fill="#64748b" font-size="9" font-weight="600">{AI_COL1_LABEL}</text>
      <text id="ai-id" x="12" y="48" fill="#3b82f6" font-size="11" font-weight="bold" textLength="70" lengthAdjust="spacingAndGlyphs">{AI_RULE_ID}</text>
      <!-- Column 2: Action -->
      <text x="125" y="34" fill="#64748b" font-size="9" font-weight="600" text-anchor="middle">{AI_COL2_LABEL}</text>
      <text id="ai-action" x="125" y="48" fill="#3b82f6" font-size="11" font-weight="bold" text-anchor="middle">{AI_ACTION}</text>
      <!-- Column 3: Target Power -->
      <text x="170" y="34" fill="#64748b" font-size="9" font-weight="600">{AI_COL3_LABEL}</text>
      <text id="ai-power" x="170" y="48" fill="#1e293b" font-size="12" font-weight="bold">{AI_POWER}</text>
    </g>

    <!-- 6. CENTRAL HUB / INVERTER (origin 155, 320) -->
    <g transform="translate(155, 320)" filter="url(#card-shadow)">
      <rect x="0" y="0" width="40" height="56" rx="8" fill="#0f172a" />
      <path d="M 0 16 Q 20 22 40 16" fill="none" stroke="#334155" stroke-width="2" />
      <rect x="12" y="24" width="16" height="6" rx="2" fill="#cbd5e1" />
      <circle cx="11" cy="43" r="3" fill="#10b981" filter="url(#lamp-glow)" />
    </g>

    <!-- 7. GRID NODE (origin 0, 420) -->
    <g transform="translate(0, 420)">
      <rect x="2" y="2" width="106" height="50" rx="8" fill="#ffffff" stroke="#94a3b8" stroke-width="2" filter="url(#card-shadow)" />
      <text x="12" y="20" fill="#475569" font-size="12" font-weight="600">{GRID_LABEL}</text>
      <text id="node-grid-text" x="12" y="40" fill="#1e293b" font-size="16" font-weight="bold">{GRID_VALUE}</text>
      <g transform="translate(68, 8)">
        <path d="M 12 26 L 18 6 L 24 26 M 10 14 L 26 14 M 14 20 L 22 20 M 15 8 L 21 8"
              fill="none" stroke="#475569" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" />
        <path id="grid-arrow" d="M 4 18 L 10 18 M 8 16 L 10 18 L 8 20"
              fill="none" stroke="#ef4444" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" />
      </g>
    </g>

    <!-- 8. LOAD / FACTORY NODE (origin 122, 420) -->
    <g transform="translate(122, 420)">
      <rect x="2" y="2" width="106" height="50" rx="8" fill="#ffffff" stroke="#94a3b8" stroke-width="2" filter="url(#card-shadow)" />
      <text x="12" y="20" fill="#475569" font-size="12" font-weight="600">{LOAD_LABEL}</text>
      <text id="node-load-text" x="12" y="40" fill="#1e293b" font-size="16" font-weight="bold">{LOAD_VALUE}</text>
      <g transform="translate(68, 6)">
        <!-- Smoke puffs (hidden by default, add class="smoke-active" to animate) -->
        <g fill="#cbd5e1" filter="url(#smoke-blur)">
          <circle class="smoke-puff" id="smoke-1" cx="21" cy="4" r="2.5" />
          <circle class="smoke-puff" id="smoke-2" cx="21" cy="4" r="2.5" style="animation-delay: 0.8s;" />
          <circle class="smoke-puff" id="smoke-3" cx="21" cy="4" r="2.5" style="animation-delay: 1.6s;" />
        </g>
        <!-- Industrial building -->
        <path d="M 2 34 L 2 18 L 10 24 L 10 14 L 18 20 L 18 14 L 26 14 L 26 34 Z"
              fill="#64748b" stroke="#334155" stroke-width="1.5" stroke-linejoin="round" />
        <path d="M 2 18 L 10 24 M 10 14 L 18 20 M 18 14 L 26 14"
              stroke="#f8fafc" stroke-width="1" stroke-linecap="round" opacity="0.4" />
        <rect x="19" y="10" width="4" height="4" fill="#94a3b8" />
        <rect x="18" y="8" width="6" height="2" rx="0.5" fill="#334155" />
        <!-- Windows -->
        <rect x="6" y="26" width="3" height="4" rx="0.5" fill="#fbbf24" opacity="0.9" />
        <rect x="12" y="26" width="3" height="4" rx="0.5" fill="#fbbf24" opacity="0.9" />
        <rect x="18" y="26" width="3" height="4" rx="0.5" fill="#fbbf24" opacity="0.9" />
        <rect x="12" y="20" width="3" height="4" rx="0.5" fill="#fbbf24" opacity="0.9" />
        <rect x="18" y="20" width="3" height="4" rx="0.5" fill="#fbbf24" opacity="0.9" />
      </g>
    </g>

    <!-- 9. PV NODE (origin 244, 420) -->
    <g transform="translate(244, 420)">
      <rect x="2" y="2" width="106" height="50" rx="8" fill="#ffffff" stroke="#94a3b8" stroke-width="2" filter="url(#card-shadow)" />
      <text x="12" y="20" fill="#475569" font-size="12" font-weight="600">{PV_LABEL}</text>
      <text id="node-pv-text" x="12" y="40" fill="#1e293b" font-size="16" font-weight="bold">{PV_VALUE}</text>
      <g transform="translate(68, 8)">
        <!-- Sun + rays (hidden by default, add class="sun-active" to group to animate) -->
        <g id="pv-sun" class="sun-group">
          <g filter="url(#sun-glow)">
            <g class="sun-rays" stroke="#f59e0b" stroke-width="1.5" stroke-linecap="round">
              <line x1="22" y1="2" x2="22" y2="0" /><line x1="22" y1="14" x2="22" y2="16" />
              <line x1="16" y1="8" x2="14" y2="8" /><line x1="28" y1="8" x2="30" y2="8" />
              <line x1="17.7" y1="3.7" x2="16.3" y2="2.3" /><line x1="26.3" y1="12.3" x2="27.7" y2="13.7" />
              <line x1="17.7" y1="12.3" x2="16.3" y2="13.7" /><line x1="26.3" y1="3.7" x2="27.7" y2="2.3" />
            </g>
            <circle cx="22" cy="8" r="4" fill="#fbbf24" />
          </g>
          <g class="shine-beams" stroke="#fbbf24" stroke-width="1" stroke-linecap="round" opacity="0.6">
            <line class="shine-beam-line" x1="18" y1="12" x2="10" y2="20" />
            <line class="shine-beam-line" x1="24" y1="15" x2="16" y2="23" style="animation-delay: 0.5s;" />
          </g>
        </g>
        <!-- Solar panels -->
        <g transform="translate(0, 14)">
          <line x1="6" y1="16" x2="6" y2="20" stroke="#64748b" stroke-width="2" stroke-linecap="round" />
          <line x1="14" y1="16" x2="14" y2="20" stroke="#64748b" stroke-width="2" stroke-linecap="round" />
          <line x1="22" y1="16" x2="22" y2="20" stroke="#64748b" stroke-width="2" stroke-linecap="round" />
          <polygon points="2,16 28,16 24,6 4,6" fill="#334155" />
          <polygon points="2,15 28,15 24,5 4,5" fill="#1e293b" stroke="#475569" stroke-width="1" stroke-linejoin="round" />
          <line x1="3" y1="10" x2="26" y2="10" stroke="#3b82f6" stroke-width="0.5" opacity="0.6" />
          <line x1="3.5" y1="12.5" x2="27" y2="12.5" stroke="#3b82f6" stroke-width="0.5" opacity="0.6" />
          <line x1="2.5" y1="7.5" x2="25" y2="7.5" stroke="#3b82f6" stroke-width="0.5" opacity="0.6" />
          <line x1="10" y1="15" x2="11.5" y2="5" stroke="#3b82f6" stroke-width="0.5" opacity="0.6" />
          <line x1="15" y1="15" x2="15" y2="5" stroke="#3b82f6" stroke-width="0.5" opacity="0.6" />
          <line x1="20" y1="15" x2="18.5" y2="5" stroke="#3b82f6" stroke-width="0.5" opacity="0.6" />
          <polygon points="4,15 15,15 13,5 4,5" fill="#ffffff" opacity="0.1" />
        </g>
      </g>
    </g>

  </g>
</svg>
