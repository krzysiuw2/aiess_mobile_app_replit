<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Full Dashboard Prototype v2</title>
    <style>
        body {
            font-family: -apple-system, sans-serif;
            background-color: #f8fafc;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 2rem;
        }

        .dashboard-container {
            background: #ffffff;
            border-radius: 24px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 500px;
            padding: 2rem;
            position: relative;
            display: flex;
            flex-direction: column;
            gap: 2rem;
            align-items: stretch;
            /* Give it a mobile app feel */
            min-height: 800px;
        }

        .header {
            text-align: center;
            margin-bottom: 1rem;
        }
        
        .header h1 {
            font-size: 1.5rem;
            color: #1e293b;
            margin: 0 0 1rem 0;
        }

        .site-banner {
            background: #1e1b4b;
            color: white;
            padding: 1rem 1.5rem;
            border-radius: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .site-info h2 { margin: 0; font-size: 1.1rem; }
        .site-info p { margin: 0; font-size: 0.8rem; opacity: 0.7; }
        
        .site-status {
            background: rgba(16, 185, 129, 0.2);
            color: #10b981;
            padding: 0.25rem 0.75rem;
            border-radius: 1rem;
            font-size: 0.8rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        /* The SVG Canvas */
        .svg-canvas {
            width: 100%;
            height: 600px; /* Tall enough for the layout */
            /* border: 1px solid red; /* for debugging */
            position: relative;
        }

        svg {
            width: 100%;
            height: 100%;
            overflow: visible;
        }

        /* CSS for the Flow Lines */
        .wire-base {
            fill: none;
            stroke: #cbd5e1;
            stroke-width: 4;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .wire-electrons {
            fill: none;
            stroke: #3b82f6;
            stroke-width: 4;
            stroke-linecap: round;
            stroke-linejoin: round;
            stroke-dasharray: 8 16;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .wire-electrons.flowing { opacity: 1; }
        .flow-forward { animation: flowAnim 1s linear infinite; }
        .flow-reverse { animation: flowAnimReverse 1s linear infinite; }

        @keyframes flowAnim { from { stroke-dashoffset: 24; } to { stroke-dashoffset: 0; } }
        @keyframes flowAnimReverse { from { stroke-dashoffset: 0; } to { stroke-dashoffset: 24; } }

        /* General Node text styles */
        .tabular-text { font-variant-numeric: tabular-nums; }
        
        /* Sun animations */
        @keyframes rayPulse { 0% { opacity: 0.3; } 50% { opacity: 1; } 100% { opacity: 0.3; } }
        @keyframes shineDash { 0% { stroke-dashoffset: 20; opacity: 0; } 20% { opacity: 1; } 80% { opacity: 1; } 100% { stroke-dashoffset: -20; opacity: 0; } }
        .sun-active .sun-rays { animation: rayPulse 3s ease-in-out infinite; }
        .sun-active .shine-beam-line { animation: shineDash 2s linear infinite; }

        /* Factory smoke */
        @keyframes smokeRise {
            0% { transform: translateY(0) scale(1); opacity: 0.8; }
            100% { transform: translateY(-15px) scale(2); opacity: 0; }
        }
        .smoke-active { animation: smokeRise 2.5s ease-in infinite; }

        /* Controls Panel (overlaying the app to test) */
        .debug-controls {
            position: fixed;
            left: 20px;
            top: 20px;
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
            width: 250px;
            font-size: 0.8rem;
            max-height: 90vh;
            overflow-y: auto;
        }

        .debug-controls h3 { margin-top: 0; font-size: 1rem;}
        .control-group { margin-bottom: 10px; }
        .control-group label { display: block; font-weight: bold; margin-bottom: 5px; }
        .control-group input[type="range"] { width: 100%; }
        
    </style>
</head>
<body>

    <!-- DEBUG CONTROLS TO MANIPULATE THE DASHBOARD -->
    <div class="debug-controls">
        <h3>Live Controls</h3>
        
        <div class="control-group">
            <label>Battery SoC (%) <span id="lbl-soc">42</span></label>
            <input type="range" id="ctrl-soc" min="0" max="100" value="42" oninput="document.getElementById('lbl-soc').innerText=this.value; updateDashboard();">
        </div>
        
        <div class="control-group">
            <label>Battery Power (kW) <span id="lbl-batt">-14.2</span></label>
            <input type="range" id="ctrl-batt" min="-30" max="30" step="0.1" value="-14.2" oninput="document.getElementById('lbl-batt').innerText=this.value; updateDashboard();">
        </div>

        <div class="control-group">
            <label>Grid Power (kW) <span id="lbl-grid">0.6</span></label>
            <input type="range" id="ctrl-grid" min="-50" max="50" step="0.1" value="0.6" oninput="document.getElementById('lbl-grid').innerText=this.value; updateDashboard();">
        </div>

        <div class="control-group">
            <label>Load Power (kW) <span id="lbl-load">0.6</span></label>
            <input type="range" id="ctrl-load" min="0" max="50" step="0.1" value="0.6" oninput="document.getElementById('lbl-load').innerText=this.value; updateDashboard();">
        </div>

        <div class="control-group">
            <label>PV Power (kW) <span id="lbl-pv">0.0</span></label>
            <input type="range" id="ctrl-pv" min="0" max="50" step="0.1" value="0.0" oninput="document.getElementById('lbl-pv').innerText=this.value; updateDashboard();">
        </div>

        <div class="control-group">
            <label>AI Rule Action</label>
            <select id="ctrl-action" onchange="updateDashboard();" style="width:100%; padding:4px;">

                <option value="sb">Standby (sb)</option>
                <option value="dis">Discharge (dis)</option>
            </select>
        </div>
    </div>

        <!-- Master SVG ViewBox (350x550) provides the coordinate system for layout -->

                                <line x1="2.5" y1="7.5" x2="25" y2="7.5" stroke="#3b82f6" stroke-width="0.5" opacity="0.6" />
                                <line x1="10" y1="15" x2="11.5" y2="5" stroke="#3b82f6" stroke-width="0.5" opacity="0.6" />
                                <line x1="15" y1="15" x2="15" y2="5" stroke="#3b82f6" stroke-width="0.5" opacity="0.6" />

                            </g>
                        </g>
                    </g>
                </g>
            </svg>
        </div>
    </div>

    <!-- MAIN JAVASCRIPT LOGIC -->
    <script>
        // DOM Elements
        const lineBatt = document.getElementById('line-batt');
        const lineLoad = document.getElementById('line-load');
        const lineGrid = document.getElementById('line-grid');
        const linePv   = document.getElementById('line-pv');

        const battLiquid = document.getElementById('batt-liquid-path');
        const battWaveContainer = document.getElementById('batt-wave-container');
        
        function setFlowLine(element, state) {
            element.setAttribute('class', 'wire-electrons');
            if (state === 'forward') element.classList.add('flowing', 'flow-forward');
            if (state === 'reverse') element.classList.add('flowing', 'flow-reverse');
        }

        // Format number helper
        const fmt = (v) => Math.abs(v) < 100 ? Number(v).toFixed(1) : Math.round(v).toString();

        function scaleText(element, strVal, threshold, minSize, maxSize, targetLen) {
            element.textContent = strVal;
            if (strVal.length >= threshold) {
                element.setAttribute('font-size', minSize);
                element.setAttribute('textLength', targetLen);
                element.setAttribute('lengthAdjust', 'spacingAndGlyphs');
            } else {
                element.setAttribute('font-size', maxSize);
                element.removeAttribute('textLength');
                element.removeAttribute('lengthAdjust');
            }
        }

        // --- BATTERY ANIMATION LOOP (Global) ---
        let bTime = performance.now();
        let bOffset = 0;
        let bY = 70;
        let bTargetY = 70;
        let bSpeed = 0;
        let bDir = 1; // 1 or -1

        function animLoop(time) {
            const dt = Math.min(time - bTime, 100);
            bTime = time;

            // Interpolate Y
            bY += (bTargetY - bY) * 0.1;
            
            // Move X if speed > 0
            if (bSpeed > 0) {
                bOffset += (bSpeed * bDir * (dt / 1000));
                if (bOffset > 0) bOffset -= 120;
                if (bOffset <= -120) bOffset += 120;
            }

            battWaveContainer.setAttribute('transform', `translate(${bOffset}, ${bY})`);
            requestAnimationFrame(animLoop);
        }
        requestAnimationFrame(animLoop);

        // --- MAIN UPDATE FUNCTION ---
        function updateDashboard() {
            // Get values
            const soc = parseFloat(document.getElementById('ctrl-soc').value);
            const battPwr = parseFloat(document.getElementById('ctrl-batt').value);
            const gridPwr = parseFloat(document.getElementById('ctrl-grid').value);
            const loadPwr = parseFloat(document.getElementById('ctrl-load').value);
            const pvPwr = parseFloat(document.getElementById('ctrl-pv').value);
            const aiAction = document.getElementById('ctrl-action').value;

            // 1. Update Battery Node
            bTargetY = 130 - ((soc / 100) * 100);
            
            let bColor = '#10b981';
            if (soc <= 20) bColor = '#ef4444';
            else if (soc <= 50) bColor = '#f59e0b';
            battLiquid.setAttribute('fill', bColor);
            
            const bAbs = Math.abs(battPwr);
            if (bAbs <= 0.2) {
                bSpeed = 0;
                battLiquid.setAttribute('d', "M -120 0 Q -105 0 -90 0 T -60 0 Q -45 0 -30 0 T 0 0 Q 15 0 30 0 T 60 0 Q 75 0 90 0 T 120 0 Q 135 0 150 0 T 180 0 Q 195 0 210 0 T 240 0 V 150 H -120 Z");
            } else {
                bSpeed = 60; // Constant speed: 60px/s = 2s per full wave loop
                bDir = battPwr < 0 ? -1 : 1;
                battLiquid.setAttribute('d', "M -120 0 Q -105 -10 -90 0 T -60 0 Q -45 -10 -30 0 T 0 0 Q 15 -10 30 0 T 60 0 Q 75 -10 90 0 T 120 0 Q 135 -10 150 0 T 180 0 Q 195 -10 210 0 T 240 0 V 150 H -120 Z");
            }

            // 2. Update SoC Card
            const strSoc = `${fmt(soc)} %`;
            document.getElementById('node-soc-text').textContent = strSoc;
            document.getElementById('node-soc-text').setAttribute('fill', bColor);

            // 3. Update Battery Power Card
            scaleText(document.getElementById('node-batt-power-text'), `${fmt(bAbs)} kW`, 7, '13', '16', '45');
            document.getElementById('node-batt-power-text').setAttribute('fill', bAbs > 0.2 ? '#1e293b' : '#94a3b8');

            // 4. Update Status Card
            const statusIcon = document.getElementById('status-icon');
            const statusOuter = document.getElementById('status-outer');
            const statusInner = document.getElementById('status-inner');
            const statusText = document.getElementById('node-status-text');
            
            if (battPwr < -0.2) {
                statusText.textContent = 'Charging';
                statusText.setAttribute('fill', '#3b82f6');
                statusOuter.setAttribute('stroke', '#3b82f6');
                statusInner.setAttribute('fill', '#3b82f6');
                statusOuter.setAttribute('stroke-dasharray', 'none');
                statusIcon.setAttribute('class', 'icon-pulse');
            } else if (battPwr > 0.2) {
                statusText.textContent = 'Discharging';
                statusText.setAttribute('fill', '#f59e0b');
                statusOuter.setAttribute('stroke', '#f59e0b');
                statusInner.setAttribute('fill', '#f59e0b');
                statusOuter.setAttribute('stroke-dasharray', '15 6');
                statusIcon.setAttribute('class', 'icon-spin');
            } else {
                statusText.textContent = 'Standby';
                statusText.setAttribute('fill', '#64748b');
                statusOuter.setAttribute('stroke', '#64748b');
                statusInner.setAttribute('fill', '#64748b');
                statusOuter.setAttribute('stroke-dasharray', 'none');
                statusIcon.setAttribute('class', '');
            }

            // 5. Update Grid Node
            const gAbs = Math.abs(gridPwr);
            scaleText(document.getElementById('node-grid-text'), `${fmt(gAbs)} kW`, 7, '13', '16', '45');
            const gArrow = document.getElementById('grid-arrow');
            if (gridPwr > 0.1) {
                gArrow.setAttribute('d', "M 4 18 L 10 18 M 8 16 L 10 18 L 8 20");
                gArrow.setAttribute('stroke', '#ef4444');
            } else if (gridPwr < -0.1) {
                gArrow.setAttribute('d', "M 10 18 L 4 18 M 6 16 L 4 18 L 6 20");
                gArrow.setAttribute('stroke', '#10b981');
            } else {
                gArrow.setAttribute('d', "M 4 18 L 10 18");
                gArrow.setAttribute('stroke', '#475569');
            }

            // 6. Update Load Node
            scaleText(document.getElementById('node-load-text'), `${fmt(loadPwr)} kW`, 6, '13', '16', '45');
            document.querySelectorAll('.smoke-puff').forEach(p => {
                if (loadPwr > 0.2) p.classList.add('smoke-active');
                else p.classList.remove('smoke-active');
            });

            // 7. Update PV Node
            scaleText(document.getElementById('node-pv-text'), `${fmt(pvPwr)} kW`, 6, '13', '16', '45');
            if (pvPwr >= 0.1) document.getElementById('pv-sun').classList.add('sun-active');
            else document.getElementById('pv-sun').classList.remove('sun-active');

            // 8. Update AI Node
            const aiDict = { 'ch': ['Charge', '#3b82f6'], 'sb': ['Standby', '#64748b'], 'dis': ['Discharge', '#f59e0b'] };
            document.getElementById('ai-action').textContent = aiDict[aiAction][0];
            document.getElementById('ai-action').setAttribute('fill', aiDict[aiAction][1]);
            document.getElementById('ai-id').setAttribute('fill', aiDict[aiAction][1]);
            document.getElementById('ai-power').textContent = `${battPwr > 0 ? '+' : ''}${battPwr.toFixed(1)} kW`;
            document.getElementById('ai-power').setAttribute('fill', aiAction === 'sb' ? '#64748b' : '#1e293b');

            // 9. UPDATE ALL FLOW LINES
            // Battery Line (Negative = Charging/Forward, Positive = Discharging/Reverse)
            if (battPwr < -0.2) setFlowLine(lineBatt, 'reverse');
            else if (battPwr > 0.2) setFlowLine(lineBatt, 'forward');
            else setFlowLine(lineBatt, 'standby');

            // Load Line (Always positive flow to the factory)
            if (loadPwr > 0.2) setFlowLine(lineLoad, 'forward');
            else setFlowLine(lineLoad, 'standby');

            // Grid Line (Negative = Export/Forward, Positive = Import/Reverse)
            // Note: Line path is Hub -> Grid.
            // If Grid is Negative (export), power flows Hub -> Grid (forward)
            // If Grid is Positive (import), power flows Grid -> Hub (reverse)
            if (gridPwr < -0.1) setFlowLine(lineGrid, 'forward');
            else if (gridPwr > 0.1) setFlowLine(lineGrid, 'reverse');
            else setFlowLine(lineGrid, 'standby');

            // PV Line (Always positive flow from PV to Hub. Line drawn Hub->PV, so flow is reverse)
            if (pvPwr > 0.1) setFlowLine(linePv, 'reverse');
            else setFlowLine(linePv, 'standby');
        }

        // Init
        updateDashboard();
    </script>
</body>
</html>
